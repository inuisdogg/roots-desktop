# ============================================================================
# ROOTS デスクトップアプリ リリース CI
#   タグ `desktop-v*`(例: desktop-v1.0.1)を push すると、mac と win を並列ビルドし、
#   GitHub Releases に成果物(.dmg/.zip/.exe + latest*.yml)を publish する。
#   electron-updater はこの Release を配信元として各端末を自動アップデートする。
#
#   使い方(管理者):
#     1) desktop-apps/roots-desktop/package.json の version を上げる
#     2) git tag desktop-v1.0.1 && git push origin desktop-v1.0.1
#     3) 数分で Release が作られ、既存インストール済みアプリが自動更新される
#
#   コード署名(任意だが配布時は推奨)は下記 secrets を設定すると有効化される:
#     - macOS: CSC_LINK(Developer ID 証明書 .p12 の base64), CSC_KEY_PASSWORD,
#              APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID(公証用)
#     - Windows: WIN_CSC_LINK(コード署名証明書 .pfx の base64), WIN_CSC_KEY_PASSWORD
#   未設定でもビルドは通る(未署名 = 初回起動で警告が出る/自動更新の署名検証は限定的)。
# ============================================================================
name: desktop-release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch: {}

permissions:
  contents: write   # GitHub Releases への publish に必要

defaults:
  run:
    working-directory: desktop-apps/roots-desktop

jobs:
  build:
    strategy:
      fail-fast: false   # 片方のOSが落ちても、もう片方の成果物は生成・publishする
      matrix:
        include:
          # macos-latest は macOS 26 に上がり、electron-builder 25 の ad-hoc署名が
          # `⨯ … not a file` で落ちる。ローカル(macOS 15)で成功する universal ビルドに
          # 合わせ、検証済みの macos-15 に固定する(署名証明書を入れるまでの措置)。
          - os: macos-15
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci || npm install
      - name: Build & publish (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 証明書のないCIでは mac の ad-hoc 署名が `⨯ … not a file` で落ちるため、署名を明示スキップ
          # (未署名配布=初回起動で警告)。CSC_LINK を設定すれば下の自動探索が有効化され署名される。
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # macOS 署名・公証(secrets 未設定なら未署名でビルド継続)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows 署名
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
